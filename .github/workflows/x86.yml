name: X86 OpenWrt 25.12.4 全能稳定编译
on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  BRANCH: openwrt-25.12
  FIRMWARE_NAME: X86_25.12.4_全功能固件

jobs:
  build:
    runs-on: ubuntu-24.04
    # 拉长超时至600分钟，彻底杜绝超时失败
    timeout-minutes: 600
    # 限制单核心编译，大幅降低内存占用，防内存崩溃
    steps:
      - uses: actions/checkout@v5

      - name: 深度清理冗余空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt clean && sudo sync

      - name: 适配新版系统依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential flex bison gawk libssl-dev libelf-dev \
          libncurses-dev zlib1g-dev lib32gcc-s1 git subversion mercurial \
          python3-pip python3-setuptools unzip wget curl rsync xz-utils bridge-utils
          pip3 install pyelftools

      - name: 拉取25.12最新源码(自动同步25.12.4)
        run: |
          git clone https://github.com/openwrt/openwrt.git -b ${{ env.BRANCH }} openwrt

      - name: 加载适配新版插件源
        run: |
          cd openwrt
          echo "src-git kenzo https://github.com/kenzok8/openwrt-packages" >> feeds.conf.default
          echo "src-git small https://github.com/kenzok8/small-package" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 写入全套功能配置
        run: |
          cd openwrt
          echo "CONFIG_TARGET_KERNEL_PARTSIZE=8192" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=8192" >> .config
          echo "CONFIG_TARGET_SWAP_PARTSIZE=512" >> .config

          echo "CONFIG_PACKAGE_luci=m" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=m" >> .config
          echo "CONFIG_PACKAGE_luci-theme-argon=m" >> .config
          echo "CONFIG_PACKAGE-luci-theme-bootstrap=m" >> .config

          # 应用商店
          echo "CONFIG_PACKAGE_luci-app-store=m" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-store-zh-cn=m" >> .config

          # 代理全家桶
          echo "CONFIG_PACKAGE_luci-app-passwall=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-openclash=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-v2raya=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-hysteria=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-trojan-plus=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-wireguard=m" >> .config

          # 游戏防封
          echo "CONFIG_PACKAGE_luci-app-mwan3=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-pbr=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-syncdial=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-macvlan=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-cpumask=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-bandwidthd=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-upnp=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-flowoffload=m" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-storage=m" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-rndis=m" >> .config

          # 虚拟机多开
          echo "CONFIG_PACKAGE_luci-app-kvm=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-lxc=m" >> .config
          echo "CONFIG_PACKAGE_qemu-system-x86_64=m" >> .config
          echo "CONFIG_PACKAGE_qemu-img=m" >> .config
          echo "CONFIG_PACKAGE_libvirt=m" >> .config
          echo "CONFIG_PACKAGE_bridge-utils=m" >> .config
          echo "CONFIG_PACKAGE_vlan=m" >> .config
          echo "CONFIG_PACKAGE_tunctap=m" >> .config
          echo "CONFIG_PACKAGE_kmod-kvm-intel=m" >> .config
          echo "CONFIG_PACKAGE_kmod-kvm-amd=m" >> .config

          make defconfig

      - name: 单线程低内存编译，日志排错
        run: |
          cd openwrt
          make -j1 V=s

      - name: 上传固件成品
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FIRMWARE_NAME }}
          path: openwrt/bin/targets/x86/

      # 消息推送自行替换密钥
      - name: 微信推送
        if: always()
        run: |
          curl -s "https://sctapi.ftqq.com/替换你的SCKEY.send?title=25.12.4固件编译&desc=编译结果：${{ job.status }}"

      - name: QQ推送
        if: always()
        run: |
          curl -s "https://qmsg.zendee.cn/send/替换QQ密钥?msg=25.12.4全功能固件编译完成"
