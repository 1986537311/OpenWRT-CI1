name: X86台式机全能全家桶固件
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  BRANCH: openwrt-25.12
  FIRMWARE_NAME: X86台式机Docker代理全家桶
  FORCE_UNSAFE_CONFIGURE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 600
    steps:
      - uses: actions/checkout@v5

      - name: 清理冗余空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt clean && sudo sync
          df -h

      - name: 编译缓存加速
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: openwrt-ccache-${{ env.BRANCH }}-${{ hashFiles('.config') }}
          restore-keys: |
            openwrt-ccache-${{ env.BRANCH }}-

      - name: 安装全套编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential flex bison gawk libssl-dev libelf-dev \
          libncurses-dev zlib1g-dev lib32gcc-s1 libc6-dev-i386 git subversion mercurial \
          python3-pip python3-setuptools unzip wget curl rsync xz-utils bridge-utils ccache
          pip3 install pyelftools

      - name: 拉取官方源码
        run: |
          git clone https://github.com/openwrt/openwrt.git -b ${{ env.BRANCH }} openwrt
          cd openwrt
          git pull origin ${{ env.BRANCH }}

      - name: 加载完整插件源
        run: |
          cd openwrt
          echo "src-git kenzo https://github.com/kenzok8/openwrt-packages" >> feeds.conf.default
          echo "src-git small https://github.com/kenzok8/small-package" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 锁定X86台式机架构 + 全套全家桶配置
        run: |
          cd openwrt
          # 强制台式机64位架构
          echo "CONFIG_TARGET_x86=y" >> .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_TARGET_x86_64_Generic=y" >> .config
          # 磁盘分区大小
          echo "CONFIG_TARGET_KERNEL_PARTSIZE=8192" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=8192" >> .config
          echo "CONFIG_TARGET_SWAP_PARTSIZE=512" >> .config
          # 系统界面全家桶
          echo "CONFIG_PACKAGE_luci=m" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=m" >> .config
          echo "CONFIG_PACKAGE_luci-theme-argon=m" >> .config
          echo "CONFIG_PACKAGE_luci-theme-bootstrap=m" >> .config
          # 应用商店全家桶
          echo "CONFIG_PACKAGE_luci-app-store=m" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-store-zh-cn=m" >> .config
          # 代理翻墙全家桶
          echo "CONFIG_PACKAGE_luci-app-passwall=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-openclash=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-hysteria=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-trojan-plus=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-v2raya=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-wireguard=m" >> .config
          # Docker容器全家桶
          echo "CONFIG_PACKAGE_luci-app-docker=m" >> .config
          echo "CONFIG_PACKAGE_docker=m" >> .config
          echo "CONFIG_PACKAGE_dockerd=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-dockerman=m" >> .config
          # 网络功能全家桶
          echo "CONFIG_PACKAGE_luci-app-mwan3=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-syncdial=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-pbr=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-sqm=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-flowoffload=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-upnp=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-macvlan=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-smartdns=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-adguardhome=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-bandwidth=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-wrtbwmon=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-oaf=m" >> .config

          make defconfig

      - name: 预下载依赖文件
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: 稳定编译完整固件
        run: |
          cd openwrt
          export CCACHE_DIR=~/.ccache
          export CCACHE_COMPRESS=1
          export CCACHE_COMPRESSLEVEL=6
          make -j2 V=s 2>&1 | tee build_log.txt

      - name: 上传编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 编译运行日志
          path: openwrt/build_log.txt

      - name: 上传全套台式机固件
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FIRMWARE_NAME }}
          path: openwrt/bin/targets/x86
