name: X86满配OpenWrt每月编译
on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  BRANCH: openwrt-25.12

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5

      - name: 清理空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: 安装依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential flex bison gawk libssl-dev libelf-dev
          pip3 install pyelftools

      - name: 拉取源码
        run: |
          git clone https://gitlab.com/openwrt-mirror/openwrt.git -b ${{env.BRANCH}} openwrt

      - name: 添加国内插件源
        run: |
          cd openwrt
          sed -i '$a src-git kenzo https://gitlab.com/chenmozhijin/openwrt-packages.git' feeds.conf.default
          sed -i '$a src-git small https://gitlab.com/chenmozhijin/small.git' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 写入分区与全部插件
        run: |
          cd openwrt
          echo "CONFIG_TARGET_KERNEL_PARTSIZE=8192" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=8192" >> .config
          echo "CONFIG_TARGET_SWAP_PARTSIZE=512" >> .config
          echo "CONFIG_PACKAGE_luci=m" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=m" >> .config
          echo "CONFIG_PACKAGE_luci-theme-argon=m" >> .config
          echo "CONFIG_PACKAGE_luci-theme-bootstrap=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-ttyd=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-cron=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-commands=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-store=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-iStore=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-passwall=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-openclash=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-ssr-plus=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-hysteria=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-v2raya=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-adguardhome=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-smartdns=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-adblock=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-dnsfilter=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-mwan3=m" >> .config
          echo "CONFIG_PACKAGE-luci-app-turboccm=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-flowoffload=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-syncdial=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-multiwan=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-dockerman=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-kvm=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-lxc=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-frpc=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-zerotier=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-wireguard=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-nps=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-alist=m" >> .config
          echo "CONFIG_PACKAGE-luci-app-samba4=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-aria2=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-qbittorrent=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-transmission=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-htop=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-diskman=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-wrtbwmon=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-speedtest-web=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-netperftest=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-cpulimit=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-gameaccelerate=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-multiacclient=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-isolateclient=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-macbind=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-ipbind=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-autoreboot=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-rebootschedule=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-watchcat=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-hd-idle=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-wol=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-qos=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-port-forward=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-parentcontrol=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-urlfilter=m" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-modeswitch=m" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-storage=m" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-rndis=m" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-cdc-eem=m" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-cdc-ether=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-homeassistant=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-tuya=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-lucky=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-syncthing=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-resilio=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-rsyncd=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-dingtalk=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-wechatpush=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-telegram=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-filetransfer=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-logview=m" >> .config
          make defconfig

      - name: 启动编译
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: X86_8G+512M满配固件
          path: openwrt/bin/targets/x86/

      - name: GitHub消息通知
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            let status=context.jobStatus==='success'?'✅编译成功':'❌编译失败';
            github.rest.issues.createComment({owner:context.repo.owner,repo:context.repo.repo,issue_number:1,body:`每月2点自动编译完成：${status}`});

      - name: 微信推送
        if: always()
        run: curl -s "https://sctapi.ftqq.com/替换你的微信KEY.send?title=固件编译通知&desp=状态：${{job.status}}"

      - name: QQ推送
        if: always()
        run: curl -s "https://qmsg.zendee.cn/send/替换你的QQKEY?msg=OpenWrt编译结果：${{job.status}}"

      - name: 钉钉推送
        if: always()
        run: |
          curl -s https://oapi.dingtalk.com/robot/send?access_token=替换钉钉TOKEN -H "Content-Type:application/json" -d '{"msgtype":"text","text":{"content":"每月定时固件编译完成，状态：${{job.status}}"}}'
